<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Inspiration</title>
    
    <!-- Иконка -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>✦</text></svg>">
    
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="particles"></canvas>
    <div class="noise"></div>
    
    <div class="container">
        <h1>Random Inspiration</h1>

        <div class="gallery">
            <div class="card">
                <h2>Moodboard</h2>
                <img id="moodboard-img" src="" alt="">
            </div>

            <div class="card">
                <h2>Style</h2>
                <img id="style-img" src="" alt="">
            </div>

            <div class="card">
                <h2>Gothic</h2>
                <img id="gothic-img" src="" alt="">
            </div>
        </div>

        <button onclick="generateImages()">Generate</button>
        <button onclick="undoAll()" id="undo-all-btn" class="undo-btn">↩ Undo All</button>
        <button onclick="saveToFavorites()" class="save-btn">★ Save Concept</button>

        <p class="counter">Generate #<span id="counter-value">1</span></p>

        <!-- Избранное -->
        <div class="favorites-section">
            <h3>★ Saved Concepts</h3>
            <div class="favorites-grid" id="favorites-grid"></div>
            <p class="no-favorites" id="no-favorites">No saved concepts yet. Generate and save your first one!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
